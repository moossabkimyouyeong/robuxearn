<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Free Robux Generator 2026 - Instant Robux</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #0d1b2a, #1b263b);
      color: #e0e0e0;
      min-height: 100vh;
      text-align: center;
      padding: 20px 15px;
    }
    .container {
      max-width: 380px;
      margin: 30px auto 20px;
      background: rgba(30, 30, 50, 0.85);
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    .logo {
      font-size: 80px;
      margin-bottom: 15px;
      color: #00ff9d;
      text-shadow: 0 0 20px #00ff9d80;
    }
    h1 {
      font-size: 30px;
      color: #00ff9d;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 16px;
      margin: 15px 0 25px;
      opacity: 0.9;
    }
    .input-group {
      margin: 20px 0;
      text-align: left;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #bbb;
    }
    input {
      width: 100%;
      padding: 14px;
      background: #252540;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    input::placeholder { color: #777; }
    .amount-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 25px 0 30px;
    }
    .amount-btn {
      padding: 14px;
      background: #2a2a4a;
      border: 2px solid #444;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .amount-btn.active, .amount-btn:hover {
      background: #00ff9d;
      color: #000;
      border-color: #00ff9d;
    }
    .generate-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #00ff9d, #00c896);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,255,157,0.45);
    }
    .status {
      margin: 30px 0;
      font-size: 16px;
      color: #ffd700;
      min-height: 50px;
      line-height: 1.4;
    }
    .loading {
      display: none;
      width: 50px; height: 50px;
      border: 6px solid #2a2a4a;
      border-top: 6px solid #00ff9d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .footer {
      margin-top: 50px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">R$</div>
    <h1>Free Robux Generator 2026</h1>
    <p class="subtitle">원하는 만큼 Robux를 무료로 받으세요!<br>인증만 완료하면 바로 지급</p>

    <div class="input-group">
      <label>Roblox 닉네임</label>
      <input type="text" id="username" placeholder="Roblox 사용자 이름 입력" autocomplete="off"/>
    </div>

    <label>원하는 Robux 수량</label>
    <div class="amount-buttons">
      <button class="amount-btn" data-amount="1700">1,700</button>
      <button class="amount-btn active" data-amount="4500">4,500</button>
      <button class="amount-btn" data-amount="10000">10,000</button>
      <button class="amount-btn" data-amount="20000">20,000</button>
      <button class="amount-btn" data-amount="50000">50,000</button>
      <button class="amount-btn" data-amount="100000">100,000</button>
    </div>

    <button class="generate-btn" onclick="startGenerate()">Robux 무료 받기</button>

    <div class="status" id="status">인증 대기 중...</div>
    <div class="loading" id="loading"></div>
  </div>

  <div class="footer">
    © 2026 Free Robux Tool • made by moossab13
  </div>

  <script>
    const buttons = document.querySelectorAll('.amount-btn');
    let selectedAmount = 4500;

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAmount = btn.dataset.amount;
      });
    });

    function startGenerate() {
      const username = document.getElementById('username').value.trim();
      const status = document.getElementById('status');
      const loading = document.getElementById('loading');

      if (!username) {
        status.textContent = "닉네임을 입력해주세요!";
        status.style.color = "#ff6b6b";
        return;
      }

      status.textContent = "Human Verification 필요합니다...";
      status.style.color = "#e0e0e0";
      loading.style.display = "block";

      setTimeout(() => {
        status.textContent = "인증 확인 중입니다. 잠시만 기다려주세요...";
      }, 2500);

      setTimeout(() => {
        status.textContent = `${selectedAmount} Robux 지급 준비 중... 인증 완료!`;
      }, 5000);

      setTimeout(() => {
        status.textContent = "완료! Robux 지급 페이지로 이동합니다...";
        loading.style.display = "none";

        // 네 Linkvertise 링크 (바로 이동)
        setTimeout(() => {
          window.location.href = "https://link-center.net/3056525/ujIpTfNwSRXH";
        }, 1500);
      }, 7000);
    }
  </script>
</body>
</html>
